<body bgcolor="pink">
<h1 align="center">Job Application Form</h1>
<table>
<form method="get" autocomplete="off">
<tr>
   <td><label for="un">Name*</label></td>
   <td><input type="text" name="username" id="un" placeholder=" Firstname" autofocus required></td>
   <td><input type="text" name="username" id="un" placeholder=" last name" autofocus required></td
</tr>
<tr>
   <td><label for="f_name"> Father Name*</label></td>
   <td><input type="text" name="father username" id="f_name" placeholder="enter your  Father name" autofocus minlength="3"></td>
</tr>
<tr>
   <td><label for="email">Emailid*</label></td>
   <td><input type="text" name="email" id="email" title="enter valid mail id" placeholder="enter your mail"required></td>
</tr>
<tr>
   <td><label>Mobile no</label></td>
   <td><input type="text" name="std" value="+91" size="1" readonly>
   <input type="text" name="mobile no" pattern=[0-9]{10} title="enter only digits"></td>
</tr>
<tr>
   <td><label>Postal Address</label></td>
   <td><textarea name="address" rows="4" cols="25"></textarea></td>
</tr>
<tr>
   <td><label>Personal Addresss</label></td>
   <td><textarea name="address" rows="4" cols="25"></textarea></td>
</tr>
<tr>
   <td><label>Sex</label></td>
   <td><input type="checkbox" name="sex">male
   <input type="checkbox" name="sex">female</td>
</tr>
<tr>
   <td><label>DOB</label></td>
   <td><input type="date" name="dob"></td>
</tr>
<tr>
    <td><label>UG</label></td>
   <td><select name="course">
        <option>--select--</option>
        <option>Arts</option>
       <option>Engineering</option>
       <option>Medcical field </option>
       <option>Accounts</option>
     </select></td>
</tr>
<tr>
    <td><label>year of graduation</label></td>
   <td><select name="year">
        <option>--select--</option>
        <option>2019</option>
       <option>2020</option>
       <option>2021</option>
       <option>2022</option>
     </select></td>
</tr>
<tr>
  <td><label>UG marks</label></td>
  <td><input type="textbox"   placeholder="marks in percentage"></td>
</tr>
<tr>
    <td><label>PG</label></td>
   <td><select name="course">
        <option>--select--</option>
        <option>Arts</option>
       <option>Engineering</option>
       <option>Medcical field </option>
       <option>Accounts</option>
     </select></td>
</tr>
<tr>
    <td><label>year of graduation</label></td>
   <td><select name="year">
        <option>--select--</option>
        <option>2019</option>
       <option>2020</option>
       <option>2021</option>
       <option>2022</option>
     </select></td>
</tr>
<tr>
  <td><label>PG marks</label></td>
  <td><input type="textbox" placeholder="marks in percentage" ></td>
</tr>
<tr>
    <td><label>year of  12th  graduation</label></td>
   <td><select name="year">
        <option>--select--</option>
        <option>2015</option>
       <option>2016</option>
       <option>2017</option>
       <option>2018</option>
     </select></td>
</tr>
<tr>
  <td><label>12th marks</label></td>
  <td><input type="textbox"   placeholder="marks in percentage"></td>
<tr>
    <td><label>year of  10th graduation</label></td>
   <td><select name="year">
        <option>--select--</option>
        <option>2013</option>
       <option>2014</option>
       <option>2015</option>
       <option>2016</option>
     </select></td>
</tr>
<tr>
   <td><label>10th marks</label></td>
   <td><input type="textbox"  placeholder="marks in percentage"></td>
</tr>
<tr>

   <td><input type="checkbox" name="loc">Yes

</tr>

        <option>--select--</option>

       <option>Chennai</option>
       <option>Bangalore</option>

     </select></td>
</tr>

<tr>

   <td><input type="checkbox" name="sex">Yes

</tr>
<tr>

  <td><input type="file" accept=".pdf"></td>
</tr>
<tr>
</tr>

</tr>
